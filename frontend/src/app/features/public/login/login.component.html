<div class="login-page">
  <div class="login-page__bg">
    <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1400&q=80" alt="Background" />
    <div class="login-page__overlay"></div>
  </div>

  <div class="login-page__card card animate-scale-in">
    <div class="login-page__header">
      <h1 class="login-page__title">La Terraza</h1>
      <p class="login-page__sub">Panel Administrativo</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-page__form">
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" formControlName="email" placeholder="admin@laterraza.mx" autocomplete="email" />
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" formControlName="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      @if (error()) {
        <div class="login-page__error">{{ error() }}</div>
      }

      <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;" [disabled]="loading() || form.invalid">
        @if (loading()) { Ingresando... } @else { Iniciar Sesión }
      </button>
    </form>

    <div class="login-page__footer">
      <small>Demo: admin&#64;laterraza.mx / admin123</small>
    </div>
  </div>
</div>
